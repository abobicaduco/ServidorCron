<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojo Satoru - Atmosfera Infinita</title>
    <style>
        :root {
            --red: #ff0000;
            --blue: #0000ff;
            --purple: #4b0082; /* Roxo mais escuro e fechado para evitar tons rosados */
            --dark: #010103;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: var(--dark);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Container de distorção e embaçamento */
        .ambient-container {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(140px) contrast(1.3); /* Aumentado o blur para maior fluidez */
            overflow: hidden;
            z-index: 1;
        }

        /* Esferas de energia abstratas */
        .energy-blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.5;
            will-change: transform;
        }

        /* Granulação e Ruído para textura cinematográfica */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.12;
            z-index: 2;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* Overlay de vinheta profunda */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            z-index: 4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ambient-container" id="energy-field">
        <!-- Manchas de energia geradas pelo script -->
    </div>

    <div class="noise-overlay"></div>
    <div class="vignette"></div>
    
    <canvas id="particleCanvas"></canvas>

    <script>
        const field = document.getElementById('energy-field');
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 1920;
        canvas.height = 1080;

        // Paleta estrita: Vermelho, Azul e Roxo Profundo
        const energyColors = ['#ff0000', '#0000ff', '#4b0082'];
        const blobs = [];

        class EnergyBlob {
            constructor(color, size) {
                this.el = document.createElement('div');
                this.el.className = 'energy-blob';
                this.size = size;
                this.x = Math.random() * 1920;
                this.y = Math.random() * 1080;
                // Velocidades ligeiramente diferentes para caos
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                
                this.el.style.width = size + 'px';
                this.el.style.height = size + 'px';
                this.el.style.backgroundColor = color;
                this.el.style.left = '-150px';
                this.el.style.top = '-150px';
                
                field.appendChild(this.el);
            }

            update() {
                // Mudança errática aleatória
                if (Math.random() > 0.97) {
                    this.vx += (Math.random() - 0.5) * 3;
                    this.vy += (Math.random() - 0.5) * 3;
                }

                // Limite de velocidade para manter a fluidez
                const limit = 7;
                this.vx = Math.max(-limit, Math.min(limit, this.vx));
                this.vy = Math.max(-limit, Math.min(limit, this.vy));

                this.x += this.vx;
                this.y += this.vy;

                // Rebote suave fora da visão
                if (this.x < -400 || this.x > 2320) this.vx *= -1;
                if (this.y < -400 || this.y > 1480) this.vy *= -1;

                this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;
            }
        }

        // Criar 10 grandes massas de energia
        for(let i=0; i<10; i++) {
            const color = energyColors[i % energyColors.length];
            const size = 700 + Math.random() * 500;
            blobs.push(new EnergyBlob(color, size));
        }

        // Partículas de "poeira amaldiçoada"
        const particles = [];
        class Spark {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * 1920;
                this.y = Math.random() * 1080;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x < 0 || this.x > 1920 || this.y < 0 || this.y > 1080) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<80; i++) particles.push(new Spark());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            blobs.forEach(b => b.update());
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.onload = animate;
    </script>
</body>
</html>
